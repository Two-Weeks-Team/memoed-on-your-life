name: iOS

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relay-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify public repository cleanliness
        working-directory: .
        run: bash scripts/repository-cleanliness.sh

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: relay/package-lock.json

      - name: Install pinned relay dependencies
        run: npm ci

      - name: Check relay types and generated bindings
        run: npm run check

      - name: Test relay contracts and budget ledger
        run: npm test

      - name: Verify deploy bundle without deployment
        run: npm run dry-run

  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer

      - name: Install pinned XcodeGen
        env:
          XCODEGEN_URL: https://github.com/yonaskolb/XcodeGen/releases/download/2.44.1/xcodegen.zip
          XCODEGEN_SHA256: a2e905fb68446e9bb4008cdfe2e13e3f176d0cbcca828b71770f8e53fca91b73
        run: |
          curl --fail --silent --show-error --location "$XCODEGEN_URL" \
            --output "$RUNNER_TEMP/xcodegen.zip"
          echo "$XCODEGEN_SHA256  $RUNNER_TEMP/xcodegen.zip" | shasum -a 256 --check
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          sudo "$RUNNER_TEMP/xcodegen/install.sh"
          xcodegen --version

      - name: Generate project
        run: |
          xcodegen generate
          git diff --exit-code -- MemoedOnYourLife.xcodeproj

      - name: Seed simulator photo fixture
        run: |
          xcrun simctl boot "iPhone 17" || true
          xcrun simctl bootstatus "iPhone 17" -b
          xcrun simctl ui "iPhone 17" content_size large
          xcrun simctl ui "iPhone 17" increase_contrast disabled
          xcrun simctl ui "iPhone 17" appearance light
          xcrun simctl addmedia "iPhone 17" docs/evidence/phase2/iphone13-timed-transcript.png

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild \
            -project MemoedOnYourLife.xcodeproj \
            -scheme MemoedOnYourLife \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify

          xcrun simctl ui "iPhone 17" content_size accessibility-extra-extra-extra-large
          xcrun simctl ui "iPhone 17" increase_contrast enabled
          xcodebuild \
            -project MemoedOnYourLife.xcodeproj \
            -scheme MemoedOnYourLife \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:MemoedOnYourLifeUITests/MemoedOnYourLifeUITests/testEnglishAccessibilityXXXLKeepsWhyAndChallengeReachable \
            -only-testing:MemoedOnYourLifeUITests/MemoedOnYourLifeUITests/testChallengedHomePassesVisualAccessibilityAuditAtXXXL \
            test | xcbeautify

      - name: Build release candidate without signing
        run: |
          xcodebuild \
            -project MemoedOnYourLife.xcodeproj \
            -scheme MemoedOnYourLife \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/ReleaseDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify
