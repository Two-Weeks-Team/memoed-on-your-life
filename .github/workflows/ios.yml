name: iOS

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer

      - name: Install pinned XcodeGen
        env:
          XCODEGEN_URL: https://github.com/yonaskolb/XcodeGen/releases/download/2.44.1/xcodegen.zip
          XCODEGEN_SHA256: a2e905fb68446e9bb4008cdfe2e13e3f176d0cbcca828b71770f8e53fca91b73
        run: |
          curl --fail --silent --show-error --location "$XCODEGEN_URL" \
            --output "$RUNNER_TEMP/xcodegen.zip"
          echo "$XCODEGEN_SHA256  $RUNNER_TEMP/xcodegen.zip" | shasum -a 256 --check
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          sudo "$RUNNER_TEMP/xcodegen/install.sh"
          xcodegen --version

      - name: Generate project
        run: |
          xcodegen generate
          git diff --exit-code -- MemoedOnYourLife.xcodeproj

      - name: Seed simulator photo fixture
        run: |
          xcrun simctl boot "iPhone 17" || true
          xcrun simctl bootstatus "iPhone 17" -b
          xcrun simctl addmedia "iPhone 17" docs/evidence/phase2/iphone13-timed-transcript.png

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild \
            -project MemoedOnYourLife.xcodeproj \
            -scheme MemoedOnYourLife \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify
