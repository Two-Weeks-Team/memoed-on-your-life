name: MemoedOnYourLife

options:
  bundleIdPrefix: co.2weeks
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: G992TM2MX7
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: true
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true

targets:
  MemoedOnYourLife:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.2weeks.memoedonyourlife
        PRODUCT_NAME: "$(TARGET_NAME)"
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Memoed
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Memoed uses the microphone only when you choose to record evidence.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      gatherCoverageData: true
      testTargets:
        - MemoedOnYourLifeTests
        - MemoedOnYourLifeUITests

  MemoedOnYourLifeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: MemoedOnYourLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.2weeks.memoedonyourlife.tests
        GENERATE_INFOPLIST_FILE: true

  MemoedOnYourLifeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: MemoedOnYourLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.2weeks.memoedonyourlife.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: MemoedOnYourLife
